name: Daily Notice Check

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 0시 UTC = 한국 오전 9시
  workflow_dispatch:

permissions:
  contents: write    # ✅ 리포지토리 파일 쓰기 권한 부여 (중요)

jobs:
  check_notice:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # ✅ git push 시 자격 증명 유지
          token: ${{ secrets.GITHUB_TOKEN }}  # ✅ 자동 제공 토큰으로 인증

      - name: Install CA certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notice checker
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
        run: python main.py

      - name: Commit updated DB
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db.sqlite3
          git commit -m "chore: update db.sqlite3 on $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push